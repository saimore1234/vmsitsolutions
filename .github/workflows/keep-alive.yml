name: Keep Render backend awake

on:
  schedule:
    # Every 10 minutes — Render free web services sleep after 15 minutes of inactivity,
    # and separately Neon's free Postgres suspends its compute after its own inactivity
    # window. Hitting a DB-backed route (not just /health) keeps both layers warm.
    # GitHub disables scheduled workflows automatically after 60 days without a commit
    # to the repo, so keep pushing at least occasionally.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          if [ -z "${{ vars.RENDER_BACKEND_URL }}" ]; then
            echo "Set the RENDER_BACKEND_URL repository variable (Settings -> Secrets and variables -> Actions -> Variables) to your Render service URL, e.g. https://vms-backend.onrender.com"
            exit 1
          fi
          # This workflow often only fires ~hourly instead of every 10 minutes (GitHub
          # throttles scheduled workflows on low-activity repos), so it almost always hits
          # a fully-slept instance — cold start can run well past a minute. Retry generously.
          curl -fsS --max-time 180 --retry 10 --retry-delay 15 --retry-all-errors --retry-connrefused "${{ vars.RENDER_BACKEND_URL }}/health"
      - name: Ping a database-backed route (keeps Neon compute awake too)
        if: always()
        run: curl -fsS --max-time 180 --retry 10 --retry-delay 15 --retry-all-errors --retry-connrefused "${{ vars.RENDER_BACKEND_URL }}/api/v1/testimonials?limit=1"
