name: Keep Render backend awake

on:
  schedule:
    # Every 10 minutes — Render free web services sleep after 15 minutes of inactivity.
    # GitHub disables scheduled workflows automatically after 60 days without a commit
    # to the repo, so keep pushing at least occasionally.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          if [ -z "${{ vars.RENDER_BACKEND_URL }}" ]; then
            echo "Set the RENDER_BACKEND_URL repository variable (Settings -> Secrets and variables -> Actions -> Variables) to your Render service URL, e.g. https://vms-backend.onrender.com"
            exit 1
          fi
          curl -fsS "${{ vars.RENDER_BACKEND_URL }}/health"
